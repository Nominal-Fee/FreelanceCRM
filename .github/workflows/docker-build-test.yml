name: Docker Build and Test

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create environment variables file
        run: |
          # Create a dummy .env file for the backend to prevent docker compose errors
          touch backend/.env
          echo "SECRET_KEY=ci-test-secret" >> backend/.env

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for services to initialize
        run: |
          echo "Waiting for services to start..."
          sleep 15

      - name: Verify running containers
        run: docker compose ps

      - name: Test Frontend Health
        run: |
          echo "Testing frontend connection..."
          curl --retry 5 --retry-delay 3 --retry-all-errors -f http://localhost:5173

      - name: Test Backend Health
        run: |
          echo "Testing backend connection..."
          # Adjust the endpoint depending on how the backend healthcheck is configured (/ or /api/health)
          curl --retry 5 --retry-delay 3 --retry-all-errors -f http://localhost:5000 || curl -f http://localhost:5000/api/health

      - name: View logs on failure
        if: failure()
        run: docker compose logs
